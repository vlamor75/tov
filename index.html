<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Test Debug</title>
    <!-- Primero A-Frame, luego MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      #start-screen {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: #111;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: white; font-family: sans-serif;
        z-index: 9999;
        text-align: center;
        padding: 20px;
      }
      #start-btn {
        background: #555; color: white;
        border: none; padding: 16px 40px;
        font-size: 1.2rem; border-radius: 50px;
        cursor: pointer; margin-top: 24px;
      }
      #start-btn.ready { background: #c0392b; }
      #scene-status { margin-top: 12px; font-size: 0.85rem; opacity: 0.6; }
      #log {
        position: fixed; bottom: 0; left: 0;
        width: 100%; background: rgba(0,0,0,0.85);
        color: #0f0; font-family: monospace; font-size: 0.8rem;
        padding: 10px; z-index: 99999;
        max-height: 200px; overflow-y: auto;
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <h2>AR Test Debug</h2>
      <img src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png"
           style="width:180px; border-radius:8px;" />
      <button id="start-btn" onclick="startAR()" disabled>⏳ Cargando...</button>
      <p id="scene-status">Esperando A-Frame...</p>
    </div>

    <div id="log"></div>

    <a-scene
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box
          color="#c0392b"
          width="0.5" height="0.5" depth="0.5"
          position="0 0 0.1"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-box>
      </a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const btn = document.getElementById('start-btn');
      const sceneStatus = document.getElementById('scene-status');
      const startScreen = document.getElementById('start-screen');
      const logEl = document.getElementById('log');
      let sceneReady = false;

      function log(msg) {
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += `[${time}] ${msg}<br>`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      log('Página cargada...');

      scene.addEventListener('loaded', () => {
        log('✅ A-Frame loaded');
        sceneReady = true;
        btn.disabled = false;
        btn.textContent = '▶ Iniciar AR';
        btn.classList.add('ready');
        sceneStatus.textContent = 'Listo';

        const arSystem = scene.systems['mindar-image-system'];
        log(arSystem ? '✅ MindAR system OK' : '❌ MindAR system NO encontrado');
      });

      scene.addEventListener('arReady', () => log('✅ arReady — cámara activa!'));
      scene.addEventListener('arError', (e) => log('❌ arError: ' + JSON.stringify(e.detail)));

      function startAR() {
        startScreen.style.display = 'none';
        log('▶ Iniciando AR...');
        try {
          const arSystem = scene.systems['mindar-image-system'];
          arSystem.start();
          log('start() OK');
        } catch(e) {
          log('❌ Error: ' + e.message);
        }
      }

      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', () => log('🎯 ¡Target detectado!'));
      target.addEventListener('targetLost',  () => log('Target perdido'));
    </script>
  </body>
</html>
