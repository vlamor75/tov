<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Test</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      #start-screen {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: #111;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: white; font-family: sans-serif;
        z-index: 9999;
        text-align: center;
        padding: 20px;
      }
      #start-btn {
        background: #c0392b; color: white;
        border: none; padding: 16px 40px;
        font-size: 1.2rem; border-radius: 50px;
        cursor: pointer; margin-top: 24px;
      }
      #log {
        position: fixed; bottom: 0; left: 0;
        width: 100%; background: rgba(0,0,0,0.8);
        color: #0f0; font-family: monospace; font-size: 0.8rem;
        padding: 10px; z-index: 99999;
        max-height: 150px; overflow-y: auto;
        display: none;
      }
    </style>
  </head>
  <body>

    <div id="start-screen">
      <h2>AR Test</h2>
      <p style="opacity:0.6; font-size:0.9rem; margin-bottom: 8px">
        Usa esta imagen de prueba para apuntar:
      </p>
      <img src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png"
           style="width:200px; border-radius:8px;" />
      <button id="start-btn" onclick="startAR()">▶ Iniciar AR</button>
    </div>

    <div id="log"></div>

    <a-scene
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box
          color="#c0392b"
          width="0.5" height="0.5" depth="0.5"
          position="0 0 0.1"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-box>
      </a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const startScreen = document.getElementById('start-screen');
      const logEl = document.getElementById('log');

      function log(msg) {
        logEl.style.display = 'block';
        logEl.innerHTML += msg + '<br>';
        logEl.scrollTop = logEl.scrollHeight;
      }

      function startAR() {
        startScreen.style.display = 'none';
        log('▶ Iniciando...');
        const arSystem = scene.systems['mindar-image-system'];
        arSystem.start();
        log('arSystem.start() OK');
      }

      scene.addEventListener('arReady', () => log('✅ Cámara activa y lista'));
      scene.addEventListener('arError', (e) => log('❌ Error: ' + JSON.stringify(e.detail)));

      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', () => log('🎯 ¡Target detectado!'));
      target.addEventListener('targetLost',  () => log('Target perdido'));
    </script>
  </body>
</html>
