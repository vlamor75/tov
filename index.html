<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Demo - Talleres de Oración y Vida</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #loading {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: white; font-family: sans-serif;
        z-index: 9999; transition: opacity 0.5s;
      }
      #loading p { margin-top: 16px; font-size: 1.1rem; opacity: 0.8; }
      #hint { margin-top: 24px; font-size: 0.85rem; opacity: 0.5; display: none; }
      .spinner {
        width: 50px; height: 50px;
        border: 5px solid rgba(255,255,255,0.2);
        border-top-color: #c0392b;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-text">Iniciando cámara AR…</p>
      <p id="hint">Apunta al logo cuando aparezca la cámara</p>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="10000">
        <video
          id="ar-video"
          src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
          preload="auto" loop="true"
          crossorigin="anonymous"
          playsinline webkit-playsinline
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#ar-video"
          width="1" height="0.5625"
          position="0 0 0.01"
          material="shader: flat"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const loading = document.getElementById('loading');
      const loadingText = document.getElementById('loading-text');
      const hint = document.getElementById('hint');
      const videoEl = document.getElementById('ar-video');
      const scene = document.querySelector('a-scene');

      function hideLoading() {
        loading.style.opacity = '0';
        setTimeout(() => loading.style.display = 'none', 500);
      }

      scene.addEventListener('loaded', hideLoading);

      // Fallback: a los 5s muestra mensaje y a los 6.5s oculta el loading
      setTimeout(() => {
        loadingText.textContent = '¡Listo! Apunta al logo';
        hint.style.display = 'block';
        setTimeout(hideLoading, 1500);
      }, 5000);

      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', () => {
        videoEl.play().catch(e => console.warn('Autoplay:', e));
      });
      target.addEventListener('targetLost', () => videoEl.pause());
    </script>
  </body>
</html>
